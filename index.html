<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Preview</title>

<style>
    body {
        margin: 0;
        background: #111;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .container {
        width: 100%;
        max-width: 600px;
        padding: 10px;
    }

    .video-box {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 9; /* penting untuk iPhone */
        overflow: hidden;
        border-radius: 12px;
        background: #000;
    }

    .video-box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }

    /* PLAY BUTTON */
    .play-btn {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 70px;
        height: 70px;
        background: rgba(0,0,0,0.6);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
    }

    .play-btn::before {
        content: '';
        border-style: solid;
        border-width: 12px 0 12px 18px;
        border-color: transparent transparent transparent white;
        margin-left: 5px;
    }

    /* TITLE DI ATAS */
    .title {
        text-align: center;
        color: #fff;
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 10px;
    }

    /* BUTTON BAWAH */
    .btn {
        margin-top: 12px;
        width: 100%;
        padding: 12px;
        background: #ff0000;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
    }

    /* RESPONSIVE FIX */
    @media (max-width: 480px) {
        .play-btn {
            width: 55px;
            height: 55px;
        }

        .title {
            font-size: 16px;
        }
    }
</style>
</head>

<body>

<div class="container">

    <div class="title">VIDEO TITLE HERE</div>

    <div class="video-box" onclick="playVideo()">
        <img src="https://cdn.aceimg.com/364f13537.png" alt="thumbnail">

        <div class="play-btn"></div>
    </div>

    <button class="btn" onclick="playVideo()">▶ PLAY HD VIDEO</button>

</div>

<script>
function playVideo() {
    // GANTI LINK VIDEO DI SINI
    window.location.href = "https://your-link.com";
}
</script>

</body>
</html>
