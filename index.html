<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Preview</title>

<style>
body {
    margin: 0;
    background: #111;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* WRAPPER */
.wrapper {
    width: 90%;
    max-width: 800px;
    text-align: center;
    color: white;
}

/* TITLE DI ATAS */
.video-title {
    font-size: 24px;
    margin-bottom: 15px;
}

/* CONTAINER VIDEO */
.video-container {
    position: relative;
    width: 100%;
    border-radius: 15px;
    overflow: hidden;
    display: block;
}

/* RATIO */
.video-container::before {
    content: "";
    display: block;
    padding-top: 56.25%;
}

/* IMAGE */
.video-container img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.6);
}

/* PLAY CENTER */
.play-button {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
}

.circle {
    width: 80px;
    height: 80px;
    background: rgba(0, 123, 255, 0.9);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
}

.circle::before {
    content: '';
    border-style: solid;
    border-width: 15px 0 15px 25px;
    border-color: transparent transparent transparent white;
    margin-left: 5px;
}

/* BUTTON BAWAH */
.play-hd-btn {
    margin-top: 15px;
    display: inline-block;
    padding: 12px 25px;
    background: white;
    color: black;
    font-weight: bold;
    border-radius: 30px;
    font-size: 14px;
    text-decoration: none;
    transition: 0.3s;
}

.play-hd-btn:hover {
    background: #ddd;
}
</style>
</head>

<body>

<div class="wrapper">

    <div class="video-title">Your Video Title</div>

    <a href="https://your-url.com" class="video-container">
        <img src="https://cdn.aceimg.com/364f13537.png" alt="Thumbnail">

        <div class="play-button">
            <div class="circle"></div>
        </div>
    </a>

    <a href="https://your-url.com" class="play-hd-btn">
        PLAY HD VIDEO
    </a>

</div>

</body>
</html>
