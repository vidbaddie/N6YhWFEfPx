<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Preview</title>

<style>
    body {
        margin: 0;
        background: #111;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .container {
        width: 100%;
        max-width: 600px;
        padding: 10px;
    }

    .title {
        text-align: center;
        color: #fff;
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 10px;
    }

    .video-box {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 9;
        overflow: hidden;
        border-radius: 12px;
        background: #000;
        cursor: pointer;
    }

    .video-box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }

    .play-btn {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 70px;
        height: 70px;
        background: rgba(0,0,0,0.6);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .play-btn::before {
        content: '';
        border-style: solid;
        border-width: 12px 0 12px 18px;
        border-color: transparent transparent transparent white;
        margin-left: 5px;
    }

    .btn {
        margin-top: 12px;
        width: 100%;
        padding: 12px;
        background: #ff0000;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
    }

    @media (max-width: 480px) {
        .play-btn {
            width: 55px;
            height: 55px;
        }

        .title {
            font-size: 16px;
        }
    }
</style>
</head>

<body>

<div class="container">

    <div class="title">VIDEO TITLE HERE</div>

    <!-- CLICK AREA -->
    <div class="video-box" id="videoBox">
        <img src="YOUR-IMAGE.jpg" alt="thumbnail">
        <div class="play-btn"></div>
    </div>

    <!-- BUTTON -->
    <button class="btn" id="playBtn">▶ PLAY HD VIDEO</button>

</div>

<script>
const url = "https://your-link.com"; // GANTI LINK DI SINI

function goToVideo() {
    window.location.href = url; // FIX: tidak buka tab baru
}

// FIX iPhone (pakai event listener, bukan inline onclick)
document.getElementById("videoBox").addEventListener("click", goToVideo);
document.getElementById("playBtn").addEventListener("click", goToVideo);
</script>

</body>
</html>
