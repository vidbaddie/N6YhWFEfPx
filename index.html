<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Preview</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .container {
    width: 100%;
    max-width: 420px;
    padding: 10px;
    text-align: center;
  }

  .title {
    font-size: 14px;
    margin-bottom: 10px;
  }

  .video-card {
    position: relative;
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
  }

  .video-card img {
    width: 100%;
    display: block;
    border-radius: 12px;
  }

  .play-button {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 70px;
    height: 70px;
    background: rgba(255,255,255,0.9);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .play-button:after {
    content: '';
    border-style: solid;
    border-width: 12px 0 12px 20px;
    border-color: transparent transparent transparent #000;
    margin-left: 5px;
  }

  /* Tombol seperti gambar */
  .btn-wrapper {
    margin-top: 20px;
    display: flex;
    justify-content: center;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #ff0000;
    color: #fff;
    padding: 10px 18px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: bold;
    font-size: 14px;
  }

  .btn-icon {
    width: 0;
    height: 0;
    border-left: 10px solid #fff;
    border-top: 6px solid transparent;
    border-bottom: 6px solid transparent;
  }

  @media (max-width: 480px) {
    .play-button {
      width: 60px;
      height: 60px;
    }
  }
</style>
</head>

<body>

<div class="container">
  <div class="title">Auntie energy? unpredictable and addictive</div>

  <div class="video-card" onclick="goToLink()">
    <img src="https://cdn.aceimg.com/364f13537.png" alt="preview">
    <div class="play-button"></div>
  </div>

  <div class="btn-wrapper">
    <a href="YOUR_URL_HERE" class="btn">
      <span class="btn-icon"></span>
      Full HD Video
    </a>
  </div>
</div>

<script>
  function goToLink() {
    window.location.href = "YOUR_URL_HERE";
  }
</script>

</body>
</html>
