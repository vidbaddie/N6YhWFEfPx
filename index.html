<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calm face, but auntie always up to something</title>

<style>
    body {
        margin: 0;
        background: #111;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .video-container {
        position: relative;
        width: 90%;
        max-width: 800px;
        border-radius: 15px;
        overflow: hidden;
        cursor: pointer;
    }

    .video-container img {
        width: 100%;
        display: block;
        filter: brightness(0.6);
    }

    .video-text {
        position: absolute;
        top: 20px;
        left: 20px;
        color: white;
        z-index: 2;
    }

    .video-text h2 {
        margin: 0;
        font-size: 24px;
    }

    .video-text p {
        margin-top: 5px;
        font-size: 14px;
        opacity: 0.8;
    }

    .play-button {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 80px;
        height: 80px;
        background: rgba(0, 123, 255, 0.9);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: 0.3s;
        z-index: 2;
    }

    .play-button:hover {
        background: rgba(0, 123, 255, 1);
        transform: translate(-50%, -50%) scale(1.1);
    }

    .play-button::before {
        content: '';
        border-style: solid;
        border-width: 15px 0 15px 25px;
        border-color: transparent transparent transparent white;
        margin-left: 5px;
    }
</style>
</head>

<body>

<a href="https://your-url.com" class="video-container">
    <img src="https://cdn.aceimg.com/cf1eff43f.jpg" alt="Video Thumbnail">

    <div class="video-text">
        <p>Calm face, but auntie always up to something</p>
    </div>

    <div class="play-button"></div>
</a>

</body>
</html>
