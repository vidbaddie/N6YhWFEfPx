<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Preview</title>

<style>
body {
    margin: 0;
    background: #111;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CONTAINER */
.video-container {
    position: relative;
    width: 90%;
    max-width: 800px;
    border-radius: 15px;
    overflow: hidden;
    cursor: pointer;
    -webkit-transform: translateZ(0);
}

/* RATIO FIX (biar stabil di iPhone) */
.video-container::before {
    content: "";
    display: block;
    padding-top: 56.25%; /* 16:9 */
}

/* IMAGE */
.video-container img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.6);
}

/* TEXT */
.video-text {
    position: absolute;
    top: 20px;
    left: 20px;
    color: white;
    z-index: 2;
}

.video-text h2 {
    margin: 0;
    font-size: 22px;
}

.video-text p {
    margin-top: 5px;
    font-size: 14px;
    opacity: 0.8;
}

/* PLAY BUTTON CENTER (FIX UTAMA) */
.play-button {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 2;
}

/* BULATAN */
.play-button .circle {
    width: 80px;
    height: 80px;
    background: rgba(0, 123, 255, 0.9);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: 0.3s;
}

/* HOVER */
.video-container:hover .circle {
    transform: scale(1.1);
    background: rgba(0, 123, 255, 1);
}

/* ICON */
.play-button .circle::before {
    content: '';
    border-style: solid;
    border-width: 15px 0 15px 25px;
    border-color: transparent transparent transparent white;
    margin-left: 5px;
}
</style>
</head>

<body>

<a href="https://your-url.com" class="video-container">
    
    <img src="https://cdn.aceimg.com/364f13537.png" alt="Video Thumbnail">

    <div class="video-text">
        <h2>Your Video Title</h2>
        <p>Short description goes here</p>
    </div>

    <div class="play-button">
        <div class="circle"></div>
    </div>

</a>

</body>
</html>
