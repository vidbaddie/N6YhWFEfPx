<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Preview</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .container {
    width: 100%;
    max-width: 420px;
    padding: 10px;
    box-sizing: border-box;
    text-align: center;
  }

  .title {
    font-size: 14px;
    margin-bottom: 10px;
    opacity: 0.9;
  }

  .video-card {
    position: relative;
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
  }

  .video-card img {
    width: 100%;
    display: block;
    border-radius: 12px;
  }

  .play-button {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 70px;
    height: 70px;
    background: rgba(255,255,255,0.85);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
  }

  .play-button:after {
    content: '';
    border-style: solid;
    border-width: 12px 0 12px 20px;
    border-color: transparent transparent transparent #000;
    margin-left: 5px;
  }

  .btn {
    margin-top: 15px;
    background: red;
    color: #fff;
    padding: 12px;
    border-radius: 8px;
    text-decoration: none;
    display: inline-block;
    width: 100%;
    font-weight: bold;
  }

  /* Responsive tweak untuk iPhone */
  @media (max-width: 480px) {
    .play-button {
      width: 60px;
      height: 60px;
    }
  }
</style>
</head>

<body>

<div class="container">
  <div class="title">Auntie energy? unpredictable and addictive</div>

  <div class="video-card" onclick="goToLink()">
    <!-- Ganti dengan gambar kamu -->
    <img src="https://cdn.aceimg.com/364f13537.png" alt="preview">

    <div class="play-button"></div>
  </div>

  <a href="YOUR_URL_HERE" class="btn">▶ Full HD Video</a>
</div>

<script>
  function goToLink() {
    window.location.href = "YOUR_URL_HERE";
  }
</script>

</body>
</html>
