<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Preview</title>

<style>
    body {
        margin: 0;
        background: #111;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .video-container {
        position: relative;
        width: 90%;
        max-width: 800px;
        border-radius: 15px;
        overflow: hidden;
        cursor: pointer;
    }

    .video-container img {
        width: 100%;
        display: block;
        filter: brightness(0.7);
    }

    .play-button {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 80px;
        height: 80px;
        background: rgba(0, 123, 255, 0.9);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: 0.3s;
    }

    .play-button:hover {
        background: rgba(0, 123, 255, 1);
        transform: translate(-50%, -50%) scale(1.1);
    }

    .play-button::before {
        content: '';
        border-style: solid;
        border-width: 15px 0 15px 25px;
        border-color: transparent transparent transparent white;
        margin-left: 5px;
    }
</style>
</head>

<body>

<a href="https://url-kamu.com" target="_blank" class="video-container">
    <img src="https://cdn.aceimg.com/ba23a7cbe.jpg" alt="Video Thumbnail">
    <div class="play-button"></div>
</a>

</body>
</html>
