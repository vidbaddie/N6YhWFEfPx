<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Preview</title>

<style>
body {
    margin: 0;
    background: #111;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CONTAINER */
.video-container {
    position: relative;
    width: 90%;
    max-width: 800px;
    border-radius: 15px;
    overflow: hidden;
    text-decoration: none;
    color: white;
}

/* RATIO FIX */
.video-container::before {
    content: "";
    display: block;
    padding-top: 56.25%;
}

/* IMAGE */
.video-container img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.6);
}

/* CENTER TEXT */
.video-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 2;
    text-align: center;
    padding: 20px;
}

.video-center h2 {
    margin: 0;
    font-size: 24px;
    font-weight: bold;
}

/* PLAY BUTTON BULAT */
.play-circle {
    width: 80px;
    height: 80px;
    background: rgba(0, 123, 255, 0.9);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 15px 0;
    transition: 0.3s;
}

.video-container:hover .play-circle {
    transform: scale(1.1);
}

/* ICON */
.play-circle::before {
    content: '';
    border-style: solid;
    border-width: 15px 0 15px 25px;
    border-color: transparent transparent transparent white;
    margin-left: 5px;
}

/* BUTTON HD */
.play-hd-btn {
    margin-top: 10px;
    padding: 12px 25px;
    background: white;
    color: black;
    font-weight: bold;
    border-radius: 30px;
    font-size: 14px;
    letter-spacing: 1px;
    transition: 0.3s;
}

.video-container:hover .play-hd-btn {
    background: #ddd;
}
</style>
</head>

<body>

<a href="https://your-url.com" class="video-container">
    
    <img src="https://cdn.aceimg.com/364f13537.png" alt="Video Thumbnail">

    <div class="video-center">
        <h2>Your Video Title</h2>

        <div class="play-circle"></div>

        <div class="play-hd-btn">PLAY HD VIDEO</div>
    </div>

</a>

</body>
</html>
