<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Preview</title>

<style>
body {
    margin: 0;
    background: #0f0f0f;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    padding: 20px 10px;
    color: #fff;
}

.wrapper {
    width: 100%;
    max-width: 720px;
    text-align: center;
}

/* TITLE */
.title {
    margin-bottom: 10px;
}

.title h2 {
    margin: 0;
    font-size: 18px;
}

/* VIDEO CONTAINER (RESPONSIVE FIX) */
.video-container {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9; /* penting */
    max-height: 60vh; /* biar tidak kepanjangan di HP */
    border-radius: 12px;
    overflow: hidden;
    background: black;

    -webkit-transform: translateZ(0);
}

/* IMAGE FIX */
.video-container img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* penting */
}

/* PLAY BUTTON */
.play-button {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 70px;
    height: 70px;
    background: rgba(0, 123, 255, 0.9);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
}

.play-button::before {
    content: '';
    border-style: solid;
    border-width: 12px 0 12px 20px;
    border-color: transparent transparent transparent white;
}

/* CONTROLS */
.controls-overlay {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 8px;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}

.progress-bar {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.3);
    border-radius: 2px;
    margin-bottom: 5px;
}

.progress {
    width: 30%;
    height: 100%;
    background: #fff;
}

.controls-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #fff;
}

/* BUTTON */
.button-wrapper {
    margin-top: 20px;
}

.cta-button {
    display: inline-block;
    padding: 12px 22px;
    background: #ff0000;
    color: #fff;
    font-weight: bold;
    border-radius: 8px;
    text-decoration: none;
}

</style>
</head>

<body>

<div class="wrapper">

    <div class="title">
        <h2>Your Video Title</h2>
    </div>

    <a href="https://your-url.com" class="video-container">
        <img src="https://cdn.aceimg.com/364f13537.png" alt="Video">

        <div class="play-button"></div>

        <div class="controls-overlay">
            <div class="progress-bar">
                <div class="progress"></div>
            </div>

            <div class="controls-row">
                <div>▶ 0:00 / 8:14</div>
                <div>🔊 ⛶</div>
            </div>
        </div>
    </a>

    <div class="button-wrapper">
        <a href="https://your-url.com" class="cta-button">
            ▶ Full HD Video
        </a>
    </div>

</div>

</body>
</html>
